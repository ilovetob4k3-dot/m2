name: Populate Moonnsy snapshot

on:
  push:
    paths:
      - ".github/workflows/populate-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - name: Copy archived commit into this repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" target
          git clone "https://github.com/ilovetob4k3-dot/star-archive--moonnsy--moonnsypic.git" source
          cd source
          git checkout 1989b9ef1f9a4bb065dcca25a770b8146073ee06
          cd ../target
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a --exclude='.git' ../source/ ./
          touch .nojekyll

          notice=$(mktemp)
          cat > "$notice" <<'EOF'
          # Moonnsy public snapshot 2

          This repository preserves the Moonnsy site at source commit:

          `1989b9ef1f9a4bb065dcca25a770b8146073ee06`

          This is the middle comparison snapshot, after the large Prompts gallery was added.
          EOF
          if [ -f README.md ]; then
            printf '\n---\n\n' >> "$notice"
            cat README.md >> "$notice"
          fi
          mv "$notice" README.md

          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Populate snapshot from 1989b9e"
          git push origin HEAD:main
